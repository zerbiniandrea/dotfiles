general {
    inhibit_sleep = 3                                                       # hold suspend until session is locked (lock-notify)
    lock_cmd = pidof hyprlock || hyprlock                                   # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session                               # lock before suspend
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && hyprctl hyprsunset gamma 100   # restore display + brightness on wake
}

# 1. Dim the screen as an "about to lock" warning.
listener {
    timeout = 120
    on-timeout = hyprctl hyprsunset gamma 70
    on-resume = hyprctl hyprsunset gamma 100
}

# 2. Lock the session.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 3. Turn the panel off shortly after locking; on-resume wakes it on the next
#    keypress. Uses the Lua-config dispatch syntax (bare "dpms off" errors here).
listener {
    timeout = 330
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

# 4. Suspend the machine.
listener {
    timeout = 600                                # 10min
    on-timeout = systemctl suspend
}
