general {
    lock_cmd = pidof hyprlock || hyprlock                                  # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session                               # lock before suspend
    # restore display + brightness on wake (Lua-config dpms syntax)
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && hyprctl hyprsunset gamma 100
}

# 1. Dim the screen as an "about to lock" warning.
listener {
    timeout = 120
    on-timeout = hyprctl hyprsunset gamma 70
    on-resume = hyprctl hyprsunset gamma 100
}

# 2. Lock the session.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 3. Turn the panel off shortly after locking. The paired on-resume guarantees the
#    monitor comes back on the next keypress. dpms uses the Lua-config dispatch
#    syntax - bare "hyprctl dispatch dpms off" errors under the Lua config.
listener {
    timeout = 330
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

