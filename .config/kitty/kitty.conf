# DESKTOP ENVIRONMENT CONFIGS
#linux_display_server wayland
#wayland_titlebar_color background
#hide_window_decorations yes
#window_padding_width 3
#tab_bar_style powerline
#tab_title_template "{index}"

font_family JetBrainsMono Nerd Font Mono
font_size 11.0

# Solid background (no blur/transparency)
background_opacity 1.0

# Include theme colors (palette + tab colors)
include ../themes/current/theme/kitty.conf

disable_ligatures always
strip_trailing_spaces smart
window_padding_width 8

# Enable splits layout (required for vsplit/hsplit to work)
enabled_layouts splits,stack

# Tab bar styling — colors come from the active theme.
tab_bar_edge top
tab_bar_style separator
tab_separator " ▎ "
tab_bar_min_tabs 2
active_tab_font_style bold
inactive_tab_font_style normal

tab_bar_margin_width 8.0
tab_bar_margin_height 4.0 4.0
tab_title_template "{fmt.fg._808080}{index}.{fmt.fg.tab}  {title}"
active_tab_title_template "{fmt.bold}{index}.  {title}"

map shift+enter send_text all \e\r

# Splits
map alt+| launch --location=vsplit --cwd=last_reported
map alt+- launch --location=hsplit --cwd=last_reported

# Navigate panes (vim style)
map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right

# Close pane
map alt+w close_window

# Tabs
map alt+t launch --type=tab --cwd=last_reported
map alt+s select_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

# Move tabs
map alt+[ move_tab_backward
map alt+] move_tab_forward

# Zoom toggle
map alt+z toggle_layout stack

# Resize panes
map alt+shift+h resize_window narrower 5
map alt+shift+j resize_window shorter 5
map alt+shift+k resize_window taller 5
map alt+shift+l resize_window wider 5

